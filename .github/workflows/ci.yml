name: CI

on:
  push:
    branches: [main, dev_vtsly]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests (Phase 1 - models)
        working-directory: backend
        run: pytest tests/test_models.py -v

      - name: Run unit tests (Phase 2 - agent normalization)
        working-directory: backend
        run: pytest tests/test_agents.py::TestNormalization -v

      - name: Run unit tests (Phase 3 - AST parser)
        working-directory: backend
        run: pytest tests/test_ast_parser.py -v
