name: CI

on:
  push:
    branches: [main, dev_vtsly]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run model tests (Phase 1)
        working-directory: backend
        run: pytest tests/test_models.py -v

      - name: Run AST parser tests (Phase 3)
        working-directory: backend
        run: pytest tests/test_ast_parser.py -v

      - name: Run agent normalization tests (Phase 2)
        working-directory: backend
        env:
          GEMINI_API_KEY: "fake-key-for-ci-import-only"
        run: pytest tests/test_agents.py::TestNormalization -v

      - name: Run orchestrator merge tests (Phase 4)
        working-directory: backend
        env:
          GEMINI_API_KEY: "fake-key-for-ci-import-only"
        run: pytest tests/test_orchestrator.py::TestMergeFindingsUnit -v
